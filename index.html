<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hitesh — Looksmaxx in 26 days.</title>

    <!-- Preconnect + DNS-prefetch for third-party origins (no Google Fonts — all fonts now self-hosted) -->
    <link rel="preconnect" href="https://checkout.razorpay.com" crossorigin>
    <link rel="preconnect" href="https://connect.facebook.net" crossorigin>
    <link rel="dns-prefetch" href="https://checkout.razorpay.com">
    <link rel="dns-prefetch" href="https://connect.facebook.net">

    <!-- Razorpay checkout modal — loads in background, never blocks render -->
    <script src="https://checkout.razorpay.com/v1/checkout.js" defer></script>

    <!-- Preload LCP images -->
    <!-- /hair LCP: the after-photo in the before/after widget -->
    <link rel="preload" as="image" href="/assets/hair-result-after.webp" fetchpriority="high" />
    <!-- product page cover (beard/height/skin hero) -->
    <link rel="preload" as="image" href="/assets/hair-maxx-cover.webp" />
  </head>
  <body class="bg-bg">
    <div id="root"></div>

    <!--
      Main app bundle.
      type="module" scripts are deferred by the HTML spec — they never block render.
      No explicit `defer` attribute needed.
    -->
    <script type="module" src="/src/main.jsx"></script>

    <!--
      Meta Pixel — moved to bottom of <body> so it never blocks initial render.
      fbq() is stubbed synchronously (queue-based) so ViewContent / InitiateCheckout
      calls from React still work even if fbevents.js hasn't loaded yet.
      The actual fbevents.js is loaded with async=true inside the snippet.
    -->
    <script>
      !function(f,b,e,v,n,t,s)
      {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
      n.callMethod.apply(n,arguments):n.queue.push(arguments)};
      if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
      n.queue=[];t=b.createElement(e);t.async=!0;
      t.src=v;s=b.getElementsByTagName(e)[0];
      s.parentNode.insertBefore(t,s)}(window,document,'script',
      'https://connect.facebook.net/en_US/fbevents.js');
      fbq('init', '1423003419171271');
      fbq('track', 'PageView');
    </script>
    <noscript>
      <img height="1" width="1" style="display:none"
        src="https://www.facebook.com/tr?id=1423003419171271&ev=PageView&noscript=1" />
    </noscript>
  </body>
</html>
